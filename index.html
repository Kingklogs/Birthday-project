<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Obim❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  width: 90%;
  max-width: 600px;
  text-align: center;
  position: relative;
  z-index: 1;
}

.screen { display: none; }
.active { display: block; }

button {
  margin-top: 20px;
  padding: 12px 24px;
  background: #e11d48;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

/* Image styling */
.image-box img {
  max-width: 100%;
  border-radius: 10px;
  margin-top: 20px;
}

/* Scrollable message */
.message-wrapper {
  position: relative;
  max-height: 60vh;
  overflow: hidden;
}

.message {
  text-align: left;
  max-width: 500px;
  margin: auto;
  max-height: 60vh;
  overflow-y: auto;
}

/* Fade hint */
.message-wrapper::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: linear-gradient(to top, #0b0b0b, transparent);
}

/* Floating hearts */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.particle {
  position: absolute;
  font-size: 18px;
  opacity: 0.15;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); opacity: 0; }
  20% { opacity: 0.3; }
  to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div id="particles"></div>

<div class="container">

<div class="screen active">
  <h1 class="type" data-text="Hey… Obim, don’t rush this."></h1>
  <button onclick="next()">Start</button>
</div>

<div class="screen">
  <p class="type" data-text="I didn’t expect much at first… but somehow, you became someone I look forward to."></p>
  <button onclick="next()">Continue</button>
</div>

<div class="screen">
  <p class="type" data-text="Even with the distance… you’ve found a way to be present."></p>
  <button onclick="next()">Continue</button>
</div>

<div class="screen">
  <p class="type" data-text="There’s something I wanted to say…"></p>
  <button onclick="next()">Read it</button>
</div>

<!-- LONG MESSAGE (UPDATED) -->
<div class="screen">
  <div class="message-wrapper">
    <div class="message">
      <p class="type" data-text="I know we haven’t known each other for that long… but somehow, you’ve become more than I expected."></p>
      <p class="type" data-text="It’s strange how something new can feel this real. How someone you didn’t plan for can slowly become part of your thoughts, your days… your space."></p>
      <p class="type" data-text="And even with the distance, you’ve found a way to be present in a way that actually matters."></p>
      <p class="type" data-text="I find myself appreciating the little things more than anything—the conversations, the energy, the way things just feel… easy with you."></p>
      <p class="type" data-text="Nothing forced. Nothing complicated. Just something honest, growing quietly on its own."></p>
      <p class="type" data-text="And I think that’s what makes it different."></p>
      <p class="type" data-text="I won’t try to rush it or define it too quickly… but I won’t ignore it either."></p>
      <p class="type" data-text="Because what we have—no matter how new—feels like something worth paying attention to."></p>
      <p class="type" data-text="So today, I’m not just celebrating your birthday… I’m appreciating you."></p>
      <p class="type" data-text="Who you are. The way you think. The presence you’ve had in my life already."></p>
      <p class="type" data-text="I hope this year brings you clarity, success, and moments that actually mean something."></p>
      <p class="type" data-text="And maybe… somewhere along the way, we get the chance to build something real out of this."></p>
      <p class="type" data-text="Happy Birthday My Love❤️🫂."></p>
    </div>
  </div>
  <button onclick="next()">Continue</button>
</div>

<!-- IMAGE SECTION -->
<div class="screen">
  <h2 class="type" data-text="This moment matters a lot to me 🥹."></h2>
  <div class="image-box">
    <img src="WhatsApp Image 2026-04-18 at 18.56.30.jpeg" alt="memory">
  </div>
  <button onclick="next()">Continue</button>
</div>

<div class="screen">
  <h1 class="type" data-text="Happy Birthday My Love🎉"></h1>
  <button onclick="goToStart()">Start again</button>
</div>

</div>

<script>
let screens = document.querySelectorAll(".screen");
let index = 0;

function showScreen(i) {
  screens.forEach(s => s.classList.remove("active"));
  index = i;
  screens[index].classList.add("active");
  startTyping(screens[index]);
}

function next() {
  if (index < screens.length - 1) showScreen(index + 1);
}

function goToStart() {
  showScreen(0);
}

function startTyping(screen) {
  let elements = screen.querySelectorAll(".type");
  elements.forEach(el => {
    let text = el.getAttribute("data-text");
    el.innerHTML = "";
    let i = 0;

    function type() {
      if (i < text.length) {
        el.innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 25);
      }
    }
    type();
  });
}

startTyping(screens[0]);

function createParticle() {
  const particle = document.createElement("div");
  particle.classList.add("particle");
  particle.innerHTML = Math.random() > 0.5 ? "♡" : "❤️";

  particle.style.left = Math.random() * 100 + "vw";
  particle.style.fontSize = (16 + Math.random() * 12) + "px";
  particle.style.animationDuration = (6 + Math.random() * 6) + "s";

  document.getElementById("particles").appendChild(particle);

  setTimeout(() => {
    particle.remove();
  }, 12000);
}

setInterval(createParticle, 600);
</script>

</body>
</html>
